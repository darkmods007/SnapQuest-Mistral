<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<title>SnapQuest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<style>
/* GARDER EXACTEMENT LES MÊMES STYLES QUE DANS LE FICHIER PRÉCÉDENT */
:root{--bg:#0a0a0f;--bg2:#0f0f18;--surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.07);--border:rgba(255,255,255,0.08);--text:#f0f0f8;--text2:#9090b0;--text3:#50506a;--accent:#8b5cf6;--pink:#ec4899;--cyan:#22d3ee;--green:#10b981;--red:#f43f5e;--amber:#f59e0b;--radius:18px;--radius-sm:12px;--bottom-nav-h:70px;--grad:linear-gradient(135deg,#8b5cf6,#6366f1)}
[data-theme="ocean"]{--accent:#0ea5e9;--pink:#06b6d4;--grad:linear-gradient(135deg,#0ea5e9,#06b6d4);--bg:#020b18;--bg2:#041526}
[data-theme="rose"]{--accent:#f43f5e;--pink:#fb7185;--grad:linear-gradient(135deg,#f43f5e,#fb923c);--bg:#120008;--bg2:#1a0010}
[data-theme="forest"]{--accent:#10b981;--pink:#34d399;--grad:linear-gradient(135deg,#10b981,#06b6d4);--bg:#020f08;--bg2:#04170d}
[data-theme="gold"]{--accent:#f59e0b;--pink:#fbbf24;--grad:linear-gradient(135deg,#f59e0b,#f43f5e);--bg:#0f0a00;--bg2:#1a1000}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(139,92,246,.3);border-radius:99px}
#toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none;max-width:320px}
.toast{display:flex;align-items:center;gap:10px;padding:12px 16px;background:rgba(15,15,24,.97);border:1px solid var(--border);border-radius:var(--radius-sm);backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,.5);font-size:14px;font-weight:500;animation:toastIn .35s cubic-bezier(.34,1.56,.64,1) forwards;pointer-events:all}
.toast.out{animation:toastOut .25s ease forwards}
.toast-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
@keyframes toastIn{from{opacity:0;transform:translateX(100%) scale(.9)}to{opacity:1;transform:translateX(0) scale(1)}}
@keyframes toastOut{to{opacity:0;transform:translateX(110%) scale(.9)}}
.notif-badge{position:absolute;top:-4px;right:-6px;background:var(--red);color:white;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:99px;padding:0 4px;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg);animation:badgePop .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes badgePop{from{transform:scale(0)}to{transform:scale(1)}}
.header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center}
.header-inner{width:100%;max-width:1100px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.logo-icon{width:36px;height:36px;border-radius:10px;background:var(--grad);display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(139,92,246,.35);animation:logoBreathe 3s ease-in-out infinite}
@keyframes logoBreathe{0%,100%{box-shadow:0 0 20px rgba(139,92,246,.35)}50%{box-shadow:0 0 32px rgba(139,92,246,.6)}}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.desk-nav{display:flex;align-items:center;gap:2px}
.desk-nav-btn{position:relative;display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:var(--radius-sm);border:none;cursor:pointer;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;transition:all .2s}
.desk-nav-btn:hover{background:var(--surface2);color:var(--text)}
.desk-nav-btn.active{background:rgba(139,92,246,.15);color:var(--accent)}
.desk-nav-btn svg{width:18px;height:18px}
.header-actions{display:flex;align-items:center;gap:8px}
.avatar-ring{padding:2px;border-radius:50%;background:var(--grad);cursor:pointer}
.icon-btn{width:36px;height:36px;border-radius:10px;border:none;background:var(--surface);color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.icon-btn:hover{background:var(--surface2);color:var(--text)}
.icon-btn.logout-btn:hover{background:rgba(244,63,94,.12);color:var(--red)}
.icon-btn svg{width:18px;height:18px}
.stats-bar{background:rgba(139,92,246,.06);border-bottom:1px solid rgba(139,92,246,.1);padding:7px 20px;display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap}
.stat-pill{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--text2)}
.stat-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(16,185,129,.6);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--bottom-nav-h);background:rgba(10,10,15,.97);backdrop-filter:blur(24px);border-top:1px solid var(--border);z-index:100;display:none}
.bottom-nav-inner{height:100%;display:flex;align-items:center;justify-content:space-around;padding:0 8px}
.mob-nav-btn{position:relative;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 12px;border-radius:var(--radius-sm);border:none;cursor:pointer;background:transparent;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;transition:all .2s;min-width:56px}
.mob-nav-btn.active{color:var(--accent)}
.mob-nav-btn.active .mob-icon-wrap{background:rgba(139,92,246,.15)}
.mob-icon-wrap{width:40px;height:30px;border-radius:99px;display:flex;align-items:center;justify-content:center;transition:all .2s;position:relative}
.mob-nav-btn svg{width:22px;height:22px}
.mob-notif-badge{position:absolute;top:-2px;right:-2px;background:var(--red);color:white;font-size:9px;font-weight:700;min-width:15px;height:15px;border-radius:99px;padding:0 3px;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)}
.main{flex:1;max-width:1100px;margin:0 auto;width:100%;padding:20px 20px 40px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);backdrop-filter:blur(12px);transition:border-color .2s}
.card:hover{border-color:rgba(139,92,246,.15)}
.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:var(--radius-sm);background:var(--grad);color:white;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;transition:all .2s;box-shadow:0 4px 20px rgba(139,92,246,.3)}
.btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 28px rgba(139,92,246,.45)}
.btn-primary:active:not(:disabled){transform:translateY(0)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
.btn-ghost{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);background:transparent;color:var(--text2);border:1px solid var(--border);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;transition:all .2s}
.btn-ghost:hover{background:var(--surface2);color:var(--text);border-color:rgba(139,92,246,.25)}
.input{width:100%;padding:12px 16px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:all .2s}
.input::placeholder{color:var(--text3)}
.input:focus{border-color:rgba(139,92,246,.5);background:rgba(139,92,246,.06)}
textarea.input{resize:none;line-height:1.5}
.auth-screen{min-height:100dvh;display:flex;flex-direction:column;background:var(--bg);background-image:radial-gradient(ellipse at 20% 50%,rgba(139,92,246,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(236,72,153,.06) 0%,transparent 50%)}
.auth-center{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{width:100%;max-width:420px}
.auth-logo-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;margin-bottom:36px}
.auth-logo-icon{width:72px;height:72px;border-radius:22px;background:var(--grad);display:flex;align-items:center;justify-content:center;box-shadow:0 0 50px rgba(139,92,246,.4),0 0 100px rgba(139,92,246,.1)}
.auth-logo-icon svg{width:38px;height:38px;color:white}
.auth-title{font-family:'Syne',sans-serif;font-weight:800;font-size:34px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.auth-subtitle{color:var(--text2);font-size:15px}
.auth-form{display:flex;flex-direction:column;gap:12px}
.auth-footer{background:rgba(255,255,255,.02);border-top:1px solid var(--border)}
.auth-footer-inner{text-align:center;padding:20px;color:var(--text3);font-size:13px}
.powered{font-size:11px;font-family:'DM Mono',monospace;letter-spacing:.05em;color:var(--accent);opacity:.8}
.loading-screen{min-height:100dvh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.spinner{width:40px;height:40px;border-radius:50%;border:3px solid rgba(139,92,246,.15);border-top-color:var(--accent);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.stories-bar{padding:16px 0 12px;overflow-x:auto;display:flex;gap:12px;scrollbar-width:none;-ms-overflow-style:none}
.stories-bar::-webkit-scrollbar{display:none}
.story-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;flex-shrink:0}
.story-ring{padding:2px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--pink))}
.story-ring-inner{padding:2px;border-radius:50%;background:var(--bg);display:flex}
.story-add-btn{width:56px;height:56px;border-radius:50%;background:var(--surface2);border:2px dashed rgba(139,92,246,.4);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.story-add-btn:hover{background:rgba(139,92,246,.1);border-color:var(--accent)}
.story-add-btn svg{width:22px;height:22px;color:var(--accent)}
.story-name{font-size:11px;color:var(--text2);font-weight:500;white-space:nowrap;max-width:64px;overflow:hidden;text-overflow:ellipsis;text-align:center}
.story-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.story-viewer{width:100%;max-width:400px;position:relative;height:100dvh;max-height:780px;display:flex;flex-direction:column;background:#000;border-radius:var(--radius);overflow:hidden}
.story-progress-bar{display:flex;gap:4px;padding:12px 12px 0;position:absolute;top:0;left:0;right:0;z-index:2}
.story-seg{flex:1;height:3px;background:rgba(255,255,255,.3);border-radius:99px;overflow:hidden}
.story-seg-fill{height:100%;background:white;animation:storyProgress 5s linear forwards}
@keyframes storyProgress{from{width:0}to{width:100%}}
.story-header-overlay{position:absolute;top:22px;left:0;right:0;z-index:2;padding:8px 12px;display:flex;align-items:center;justify-content:space-between}
.story-img{width:100%;height:100%;object-fit:cover}
.story-caption-overlay{position:absolute;bottom:0;left:0;right:0;padding:40px 20px 24px;background:linear-gradient(transparent,rgba(0,0,0,.7));z-index:2;color:white;font-size:15px;line-height:1.5}
.story-close{width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.5);border:none;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.search-wrap{position:relative;max-width:620px;margin:0 auto 16px}
.search-input{width:100%;padding:11px 16px 11px 42px;background:var(--surface);border:1px solid var(--border);border-radius:99px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:all .2s}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{border-color:rgba(139,92,246,.45);background:rgba(139,92,246,.06)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);width:18px;height:18px;pointer-events:none}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;justify-content:center}
.filter-chip{padding:6px 14px;border-radius:99px;font-size:13px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.filter-chip:hover{border-color:rgba(139,92,246,.3);color:var(--text)}
.filter-chip.active{background:rgba(139,92,246,.15);border-color:var(--accent);color:var(--accent)}
.fullscreen-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.96);display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease;cursor:zoom-out}
.fullscreen-img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:var(--radius-sm)}
.fullscreen-close{position:fixed;top:20px;right:20px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);z-index:401}
.fullscreen-info{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);padding:10px 20px;border-radius:99px;color:white;font-size:13px;white-space:nowrap;z-index:401}
.theme-panel{position:fixed;top:68px;right:16px;z-index:200;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;width:200px;box-shadow:0 16px 48px rgba(0,0,0,.6);animation:toastIn .25s ease}
.theme-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:10px}
.theme-dot{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s}
.theme-dot.active{border-color:white;transform:scale(1.15)}
.feed{max-width:620px;margin:0 auto;display:flex;flex-direction:column;gap:20px}
.post-card{border-radius:var(--radius);overflow:hidden;background:var(--surface);border:1px solid var(--border)}
.post-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.post-user{display:flex;align-items:center;gap:10px}
.post-image{width:100%;display:block;max-height:600px;object-fit:cover;background:#0f0f18;cursor:zoom-in}
.post-actions{padding:12px 16px 0;display:flex;align-items:center;gap:16px}
.like-btn{display:flex;align-items:center;gap:7px;border:none;background:transparent;cursor:pointer;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;padding:6px 0;transition:all .2s}
.like-btn:hover{color:var(--pink)}.like-btn.liked{color:var(--pink)}
.like-btn svg{width:26px;height:26px;transition:transform .15s cubic-bezier(.34,1.56,.64,1)}
.like-btn:hover svg,.like-btn.liked svg{transform:scale(1.15)}
.post-caption{padding:10px 16px 0;font-size:14px;line-height:1.6}
.post-caption strong{font-weight:600;margin-right:6px}
.reactions-row{display:flex;gap:6px;padding:8px 16px 0;flex-wrap:wrap;min-height:0}
.reaction-btn{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:99px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;color:var(--text2);font-family:'DM Sans',sans-serif}
.reaction-btn:hover{background:var(--surface2);transform:scale(1.05)}
.reaction-btn.reacted{background:rgba(139,92,246,.12);border-color:rgba(139,92,246,.3);color:var(--accent)}
.reaction-picker{display:flex;gap:6px;padding:8px;background:var(--bg2);border:1px solid var(--border);border-radius:99px;box-shadow:0 8px 24px rgba(0,0,0,.4);position:absolute;bottom:calc(100% + 8px);left:0;z-index:10;animation:toastIn .2s ease}
.reaction-pick-btn{width:36px;height:36px;border-radius:50%;border:none;background:transparent;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.reaction-pick-btn:hover{background:var(--surface2);transform:scale(1.2)}
.comments-list{padding:0 16px;margin-top:8px;display:flex;flex-direction:column;gap:6px;max-height:160px;overflow-y:auto}
.comment-item{display:flex;gap:8px;align-items:flex-start;padding:8px 10px;background:rgba(255,255,255,.03);border-radius:10px;font-size:13px;line-height:1.5}
.comment-item strong{font-weight:600;display:block;margin-bottom:2px;font-size:12px;color:var(--text2)}
.comment-input-wrap{padding:12px 16px 14px;display:flex;align-items:center;gap:8px;border-top:1px solid var(--border);margin-top:10px}
.comment-input{flex:1;padding:8px 14px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:99px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:all .2s}
.comment-input::placeholder{color:var(--text3)}
.comment-input:focus{border-color:rgba(139,92,246,.4)}
.comment-send-btn{padding:7px 14px;border-radius:99px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;transition:all .2s}
.comment-send-btn:disabled{background:transparent;color:var(--text3)}
.comment-send-btn:not(:disabled){background:rgba(139,92,246,.2);color:var(--accent)}
.translate-btn{font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;padding:2px 4px;border-radius:4px;opacity:.7;transition:opacity .2s;font-family:'DM Sans',sans-serif;margin-top:3px;display:inline-block}
.translate-btn:hover{opacity:1}
.translated-text{font-size:12px;color:var(--text3);margin-top:3px;font-style:italic}
.level-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:700;border:1px solid currentColor}
.verified-badge{display:inline-flex;align-items:center;color:var(--accent);margin-left:3px}
.verified-badge svg{width:14px;height:14px}
.xp-bar-wrap{height:4px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-top:6px}
.xp-bar-fill{height:100%;border-radius:99px;background:var(--grad);transition:width .6s ease}
.chat-wrap{max-width:700px;margin:0 auto}
.chat-box{display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.chat-header{padding:16px 20px;display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,rgba(139,92,246,.15),rgba(99,102,241,.1));border-bottom:1px solid var(--border)}
.chat-header-icon{width:40px;height:40px;border-radius:12px;background:var(--grad);display:flex;align-items:center;justify-content:center}
.chat-header-icon svg{width:20px;height:20px;color:white}
.chat-messages{flex:1;height:55vh;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;background:rgba(0,0,0,.2)}
.msg-row{display:flex;gap:8px;max-width:80%}
.msg-row.me{align-self:flex-end;flex-direction:row-reverse}
.msg-row.them{align-self:flex-start}
.msg-bubble{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5}
.msg-row.me .msg-bubble{background:var(--grad);color:white;border-bottom-right-radius:4px}
.msg-row.them .msg-bubble{background:var(--surface2);color:var(--text);border-bottom-left-radius:4px;border:1px solid var(--border)}
.msg-name{font-size:11px;font-weight:600;color:var(--text3);margin-bottom:3px;padding-left:2px}
.chat-input-wrap{padding:14px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.chat-input{flex:1;padding:10px 16px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:99px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:all .2s}
.chat-input::placeholder{color:var(--text3)}
.chat-input:focus{border-color:rgba(139,92,246,.4)}
.chat-send-btn{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}

<body>
<div id="root"></div>
<div id="toast-container"></div>
<script>
/* ===== UTILS ===== */
const AudioCtx = window.AudioContext || window.webkitAudioContext; let actx = null;
const playNotifSound = (type='chat') => {try{if(!actx)actx=new AudioCtx();const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);const seqs={chat:[880,1108],photo:[660,880,1108],audio:[440,660],badge:[1108,1320,1568]};const seq=seqs[type]||seqs.chat;g.gain.setValueAtTime(.12,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.14*seq.length);seq.forEach((f,i)=>o.frequency.setValueAtTime(f,actx.currentTime+i*.12));o.type='sine';o.start(actx.currentTime);o.stop(actx.currentTime+.14*seq.length);}catch{}};
const showToast = (msg, type='info') => {const c=document.getElementById('toast-container');const t=document.createElement('div');t.className='toast';const cols={info:'#8b5cf6',success:'#10b981',error:'#f43f5e',warning:'#f59e0b',chat:'#22d3ee',photo:'#ec4899',audio:'#f59e0b',badge:'#fbbf24'};t.innerHTML=`<div class="toast-dot" style="background:${cols[type]||cols.info}"></div><span>${msg}</span>`;c.appendChild(t);setTimeout(()=>{t.classList.add('out');setTimeout(()=>t.remove(),250)},3500);};

const compressImage = (file, maxWidth = 1080) => {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                if (w > maxWidth) { h = Math.round(h * (maxWidth / w)); w = maxWidth; }
                canvas.width = w; canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, w, h);
                canvas.toBlob((blob) => { resolve(new File([blob], file.name, { type: 'image/jpeg' })); }, 'image/jpeg', 0.85);
            };
        };
    });
};

const LEVELS = [{min:0,name:'Novice',emoji:'🌱',color:'#6b7280'},{min:5,name:'Explorateur',emoji:'🔭',color:'#0ea5e9'},{min:15,name:'Créateur',emoji:'🎨',color:'#8b5cf6'},{min:30,name:'Actif',emoji:'⚡',color:'#f59e0b'},{min:50,name:'Influenceur',emoji:'🌟',color:'#ec4899'},{min:100,name:'Légende',emoji:'👑',color:'#fbbf24'}];
const getLevel = (xp) => {let l=LEVELS[0];for(const lv of LEVELS){if(xp>=lv.min)l=lv;}const idx=LEVELS.indexOf(l);const nxt=LEVELS[idx+1];return{...l,xp,progress:nxt?Math.round(((xp-l.min)/(nxt.min-l.min))*100):100,nextXp:nxt?nxt.min:null};};
const calcXP = (photos, msgs, audios, likes) => photos*3 + msgs*1 + audios*5 + likes*2;
const VERIFIED = ['admin','darkmods','owner','verified'];
const isVerified = (u) => VERIFIED.includes((u||'').toLowerCase());
const THEMES = [{id:'default',color:'#8b5cf6',label:'Violet'},{id:'ocean',color:'#0ea5e9',label:'Océan'},{id:'rose',color:'#f43f5e',label:'Rose'},{id:'forest',color:'#10b981',label:'Forêt'},{id:'gold',color:'#f59e0b',label:'Or'}];
const REACTIONS = ['❤️','🎉','🔥','🇦🇱','🤭','😂','👏','💜'];

const translateText = async (text) => {try{const r=await fetch('https://libretranslate.de/translate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({q:text,source:'auto',target:'fr',format:'text'})});if(!r.ok)throw 0;const d=await r.json();return d.translatedText||null;}catch{return'[Traduction : API LibreTranslate Indisponible]';}};

const { useState, useEffect, useRef, useCallback } = React;

const Avatar = ({url, name, size=40, fontSize=16}) => {
  if (url && url !== '') return React.createElement('img', {src: url, className: 'avatar', style: {width: size, height: size, minWidth: size}});
  return React.createElement('div', {className: 'avatar-fallback', style: {width: size, height: size, minWidth: size, fontSize}}, (name||'A')[0].toUpperCase());
};
const VerifiedBadge = () => React.createElement('span', {className: 'verified-badge', title: 'Compte vérifié'}, React.createElement('svg', {viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2}, React.createElement('path', {strokeLinecap: 'round', strokeLinejoin: 'round', d: 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z'})));

const App = () => {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [isLogin, setIsLogin] = useState(true);
  const [authForm, setAuthForm] = useState({username:'', password:'', fullName:''});
  const [authError, setAuthError] = useState('');
  const [sending, setSending] = useState(false);
  const [photos, setPhotos] = useState([]);
  const [page, setPage] = useState(1);
  const [hasMorePhotos, setHasMorePhotos] = useState(true);
  const [stories, setStories] = useState([]);
  const [selectedFile, setSelectedFile] = useState(null);
  const [storyFile, setStoryFile] = useState(null);
  const [captionText, setCaptionText] = useState('');
  const [preview, setPreview] = useState(null);
  const [uploading, setUploading] = useState(false);
  const [uploadingStory, setUploadingStory] = useState(false);
  const [isStoryMode, setIsStoryMode] = useState(false);
  const [activeTab, setActiveTab] = useState('gallery');
  const [loadingPhotos, setLoadingPhotos] = useState(false);
  const [commentInputs, setCommentInputs] = useState({});
  const [searchQuery, setSearchQuery] = useState('');
  const [filterBy, setFilterBy] = useState('recent');
  const [reactions, setReactions] = useState({});
  const [pickerOpen, setPickerOpen] = useState(null);
  const [fullscreenImg, setFullscreenImg] = useState(null);
  const [translatedMsgs, setTranslatedMsgs] = useState({});
  const [translatingMsg, setTranslatingMsg] = useState(null);
  const [translatedComments, setTranslatedComments] = useState({});
  const [messages, setMessages] = useState([]);
  const [newMessage, setNewMessage] = useState('');
  const messagesEndRef = useRef(null);
  const [audios, setAudios] = useState([]);
  const [audioFile, setAudioFile] = useState(null);
  const [audioTitle, setAudioTitle] = useState('');
  const [audioArtist, setAudioArtist] = useState('');
  const [uploadingAudio, setUploadingAudio] = useState(false);
  const [currentPlaying, setCurrentPlaying] = useState(null);
  const audioRef = useRef(null);
  const [notifications, setNotifications] = useState({gallery:0, chat:0, audio:0});
  const [editUsername, setEditUsername] = useState('');
  const [editFullName, setEditFullName] = useState('');
  const [profilePicFile, setProfilePicFile] = useState(null);
  const [profilePicPreview, setProfilePicPreview] = useState(null);
  const [theme, setTheme] = useState(() => localStorage.getItem('sq_theme') || 'default');
  const [showThemePanel, setShowThemePanel] = useState(false);
  const [liveStats, setLiveStats] = useState({online:1, postsToday:0, totalPhotos:0});
  const [viewerStory, setViewerStory] = useState(null);
  const [viewerStoryIdx, setViewerStoryIdx] = useState(0);
  const [prevLevelName, setPrevLevelName] = useState(null);
  const socketRef = useRef(null);

  useEffect(() => { document.documentElement.setAttribute('data-theme', theme === 'default' ? '' : theme); localStorage.setItem('sq_theme', theme); }, [theme]);

  // Chargement Initial
  useEffect(() => {
    fetch('/api/me', {credentials: 'include'}).then(r => r.json()).then(d => {
      if(d && d.id) {
          setUser(d); setEditUsername(d.username); setEditFullName(d.full_name);
          fetchPhotos(1, false); fetchAudios(); fetchMessages(); fetchStories();
      }
    }).catch(()=>{}).finally(()=>setLoading(false));
  }, []);

  // WebSockets (Temps Réel)
  useEffect(() => {
      if(!user) return;
      socketRef.current = io();
      
      socketRef.current.on('online_count', count => setLiveStats(s => ({...s, online: count})));
      
      socketRef.current.on('new_photo', photo => {
          if (photo.user_id !== user.id) {
              showToast('📸 Nouvelle photo publiée !', 'photo'); playNotifSound('photo');
              if (activeTab !== 'gallery') setNotifications(n => ({...n, gallery: n.gallery + 1}));
          }
          setPhotos(prev => { if (!prev.find(p => p.id === photo.id)) return [photo, ...prev]; return prev; });
      });

      socketRef.current.on('new_message', msg => {
          if (msg.user_id !== user.id) {
              if (activeTab !== 'chat') { showToast(`💬 ${msg.current_fullname}`, 'chat'); playNotifSound('chat'); setNotifications(n => ({...n, chat: n.chat + 1})); }
          }
          setMessages(prev => [...prev, msg]);
      });

      socketRef.current.on('update_like', ({photoId, delta}) => {
          setPhotos(prev => prev.map(p => p.id === photoId ? {...p, likesCount: Math.max(0, p.likesCount + delta)} : p));
      });

      socketRef.current.on('new_comment', comment => {
          setPhotos(prev => prev.map(p => p.id === comment.photo_id ? {...p, comments: [...p.comments, comment]} : p));
      });

      return () => socketRef.current.disconnect();
  }, [user, activeTab]);

  useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') { setFullscreenImg(null); setViewerStory(null); setShowThemePanel(false); setPickerOpen(null); } };
    window.addEventListener('keydown', handler); return () => window.removeEventListener('keydown', handler);
  }, []);

  useEffect(() => { if (messagesEndRef.current) messagesEndRef.current.scrollIntoView({behavior: 'smooth'}); }, [messages]);

  // API Fetchers
  const fetchPhotos = useCallback(async (pageNum = 1, append = false) => {
      setLoadingPhotos(true);
      try {
          const r = await fetch(`/api/photos?page=${pageNum}&limit=10`, {credentials: 'include'});
          if (r.status === 401) { setUser(null); return; }
          const d = await r.json();
          if (d.length < 10) setHasMorePhotos(false); else setHasMorePhotos(true);
          setPhotos(prev => {
              if (!append) return d;
              const newIds = new Set(d.map(x => x.id));
              return [...prev.filter(x => !newIds.has(x.id)), ...d];
          });
      } catch {} finally { setLoadingPhotos(false); }
  }, []);

  const fetchMessages = async () => { try { const r = await fetch('/api/messages', {credentials: 'include'}); const d = await r.json(); setMessages(d||[]); } catch {} };
  const fetchAudios = async () => { try { const r = await fetch('/api/audios', {credentials: 'include'}); const d = await r.json(); setAudios(d||[]); } catch {} };
  const fetchStories = async () => { try { const r = await fetch('/api/stories', {credentials: 'include'}); const d = await r.json(); setStories(d||[]); } catch {} };

  // Infinite Scroll Observer
  const observer = useRef();
  const lastPhotoElementRef = useCallback(node => {
      if (loadingPhotos) return;
      if (observer.current) observer.current.disconnect();
      observer.current = new IntersectionObserver(entries => {
          if (entries[0].isIntersecting && hasMorePhotos) {
              setPage(prevPage => { const next = prevPage + 1; fetchPhotos(next, true); return next; });
          }
      });
      if (node) observer.current.observe(node);
  }, [loadingPhotos, hasMorePhotos, fetchPhotos]);

  const changeTab = (tab) => { setActiveTab(tab); setNotifications(n => ({...n, [tab]: 0})); setSearchQuery(''); setFilterBy('recent'); if(tab==='gallery'){setPage(1); fetchPhotos(1, false);} if(tab==='chat') fetchMessages(); if(tab==='audio') fetchAudios(); };

  const handleAuth = async () => {
      const {username, password, fullName} = authForm;
      if (!username || !password) return;
      setSending(true); setAuthError('');
      try {
          const url = isLogin ? '/api/auth/login' : '/api/auth/register';
          const body = isLogin ? {username, password} : {username, password, full_name: fullName || username};
          const r = await fetch(url, {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body), credentials: 'include'});
          const d = await r.json();
          if (d.user) {
              setUser(d.user); setEditUsername(d.user.username); setEditFullName(d.user.full_name);
              fetchPhotos(1, false); fetchAudios(); fetchMessages(); fetchStories();
              showToast(isLogin ? `Bon retour, ${d.user.full_name} ! 👋` : `Bienvenue Sur SnapQuest ! 🎉`, 'success');
              if(!isLogin) playNotifSound('badge');
          } else { setAuthError(d.error || 'Erreur'); }
      } catch { setAuthError('Erreur réseau'); } finally { setSending(false); }
  };

  const logout = async () => { await fetch('/api/auth/logout', {method: 'POST', credentials: 'include'}); setUser(null); window.location.reload(); };

  const handleUpdateProfile = async () => { if(!editUsername) return; setSending(true); const fd = new FormData(); fd.append('username', editUsername); fd.append('full_name', editFullName); if(profilePicFile) fd.append('file', profilePicFile); try { const r = await fetch('/api/me/update', {method: 'POST', body: fd, credentials: 'include'}); const d = await r.json(); if(d.user) { setUser(d.user); setProfilePicFile(null); setProfilePicPreview(null); showToast('Profil mis à jour !', 'success'); } else { showToast(d.error || 'Erreur', 'error'); } } catch { showToast('Erreur réseau', 'error'); } finally { setSending(false); } };

  // File Change avec Compression
  const handleFileChange = async (e) => {
      const f = e.target.files[0];
      if (f) {
          const compressed = await compressImage(f);
          isStoryMode ? setStoryFile(compressed) : setSelectedFile(compressed);
          setPreview(URL.createObjectURL(compressed));
      }
  };

  const handleUpload = async () => { if(!selectedFile) return; setUploading(true); const fd = new FormData(); fd.append('file', selectedFile); fd.append('caption', captionText); try { const r = await fetch('/api/photos', {method: 'POST', body: fd, credentials: 'include'}); const d = await r.json(); if(d.id) { setSelectedFile(null); setPreview(null); setCaptionText(''); showToast('Photo publiée ! 📸', 'success'); changeTab('gallery'); } } catch { showToast('Erreur réseau', 'error'); } finally { setUploading(false); } };

  const handleStoryUpload = async () => { if(!storyFile) return; setUploadingStory(true); const fd = new FormData(); fd.append('story', storyFile); fd.append('caption', captionText); try { const r = await fetch('/api/stories', {method: 'POST', body: fd, credentials: 'include'}); const d = await r.json(); if(d.id) { setStoryFile(null); setCaptionText(''); setIsStoryMode(false); setPreview(null); showToast('Story Publiée ! ✨', 'success'); fetchStories(); changeTab('gallery'); } } catch { showToast('Erreur côté serveur', 'warning'); } finally { setUploadingStory(false); } };

  const handleAudioUpload = async () => { if(!audioFile) return; setUploadingAudio(true); const fd = new FormData(); fd.append('audio', audioFile); fd.append('title', audioTitle); fd.append('artist', audioArtist); try { const r = await fetch('/api/audios', {method: 'POST', body: fd, credentials: 'include'}); const d = await r.json(); if(d.id) { setAudioFile(null); setAudioTitle(''); setAudioArtist(''); showToast('Morceau ajouté ! 🎵', 'success'); fetchAudios(); } } catch { showToast('Erreur réseau', 'error'); } finally { setUploadingAudio(false); } };

  const deletePhoto = async (id) => { if(!confirm('Supprimer cette photo ?')) return; await fetch('/api/photos/'+id, {method: 'DELETE', credentials: 'include'}); setPhotos(p => p.filter(x => x.id !== id)); showToast('Photo supprimée', 'info'); };
  const deleteAudio = async (id) => { if(!confirm('Supprimer ?')) return; await fetch('/api/audios/'+id, {method: 'DELETE', credentials: 'include'}); setAudios(a => a.filter(x => x.id !== id)); if(currentPlaying === id) { audioRef.current?.pause(); setCurrentPlaying(null); } showToast('Supprimé', 'info'); };

  const toggleLike = async (id) => {
      setPhotos(photos.map(p => p.id === id ? {...p, isLikedByMe: !p.isLikedByMe, likesCount: p.isLikedByMe ? p.likesCount - 1 : p.likesCount + 1} : p));
      await fetch('/api/photos/'+id+'/like', {method: 'POST', credentials: 'include'});
  };

  const toggleReaction = (photoId, emoji) => { setReactions(prev => { const key = `${photoId}_${emoji}`; const cur = prev[key] || {count:0, reacted:false}; return {...prev, [key]: {count: cur.reacted ? cur.count - 1 : cur.count + 1, reacted: !cur.reacted}}; }); setPickerOpen(null); };
